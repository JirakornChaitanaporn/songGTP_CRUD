{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SongGTP - Sign In</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'bootstrap-icons/font/bootstrap-icons.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/global.css' %}" rel="stylesheet">
    <link href="{% static 'css/login.css' %}" rel="stylesheet">
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</head>
<body>
    <main>
        <section id="login" class="login">
            <div class="row">
                <div class="offset-4 col-4">
                    <div class="row">
                        <div class="col-12 text-center">
                             <div class="d-flex align-items-center justify-content-center">
                                <img src="{%static 'images/logo.png' %}" class="logo">
                                <h1 class="m-0 ms-2 SongGTP fs-3xl">SongGTP</h1>
                            </div>
                            <p class = "mb-3 text-secondary">
                                AI-Powered Song Generation
                            </p>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12">
                            <div class="card rounded-4 bg-white shadow-sm">
                                <div class="card-body p-4">
                                    <div class="row">
                                        <div class="col-12">
                                            <p class="fw-bold">
                                                Welcome back
                                            </p>
                                            <p class = "text-secondary mb-3">
                                                Sign in with google account
                                            </p>
                                            <a href="{% url 'google_auth' %}" class="btn btn-success w-100">
                                                <i class="bi bi-google text-white me-2"></i>
                                                Login with google
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
