<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Song</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="offset-3 col-6">
                <div class="card">
                    <h3 class="card-header">Update Song</h3>
                    <div class="card-body">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-6 mb-2">
                                    <label for="" class="form-label">Prompt:</label>
                                    <select name="prompt" class="form-select">
                                        <option value="">-- Select Prompt --</option>
                                        {% for p in prompts %}
                                        {% if p.id == song.prompt.id %}
                                        <option value="{{ p.id }}" selected>{{ p.song_name }}</option>
                                        {% else %}
                                        <option value="{{ p.id }}">{{ p.song_name }}</option>
                                        {% endif %}
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-6 mb-2">
                                    <label for="" class="form-label">Library:</label>
                                    <select name="library" class="form-select">
                                        <option value="">-- Select Library --</option>
                                        {% for l in libraries %}
                                        {% if l.id == song.library.id %}
                                        <option value="{{ l.id }}" selected>{{ l.user.username }}</option>
                                        {% else %}
                                        <option value="{{ l.id }}">{{ l.user.username }}</option>
                                        {% endif %}
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-6 mb-2">
                                    <label for="" class="form-label">Song Name:</label>
                                    <input type="text" name="song_name" class="form-control"
                                        value="{{ song.song_name }}">
                                </div>
                                <div class="col-6 mb-2">
                                    <label for="" class="form-label">Shared Link:</label>
                                    <input type="text" name="shared_link" class="form-control"
                                        value="{{ song.shared_link }}">
                                </div>
                                <div class="col-6 mb-2">
                                    <label for="" class="form-label">Sharing Status:</label>
                                    <select name="sharing_status" class="form-select">
                                        {% if song.sharing_status == 'private' %}
                                        <option value="private" selected>Private</option>
                                        {% else %}
                                        <option value="private">Private</option>
                                        {% endif %}
                                        {% if song.sharing_status == 'public' %}
                                        <option value="public" selected>Public</option>
                                        {% else %}
                                        <option value="public">Public</option>
                                        {% endif %}
                                    </select>
                                </div>
                                <div class="col-6 mb-2">
                                    <label for="" class="form-label">Generation Status:</label>
                                    <select name="generation_status" class="form-select">
                                        {% if song.generation_status == 'generating' %}
                                        <option value="generating" selected>Generating</option>
                                        {% else %}
                                        <option value="generating">Generating</option>
                                        {% endif %}
                                        {% if song.generation_status == 'generated' %}
                                        <option value="generated" selected>Generated</option>
                                        {% else %}
                                        <option value="generated">Generated</option>
                                        {% endif %}
                                        {% if song.generation_status == 'error' %}
                                        <option value="error" selected>Error</option>
                                        {% else %}
                                        <option value="error">Error</option>
                                        {% endif %}
                                    </select>
                                </div>
                                <div class="col-12 mb-2">
                                    <label for="" class="form-label">Song URL:</label>
                                    <input type="text" name="song_url" class="form-control" value="{{ song.song_url }}">
                                </div>
                                <div class="col-12 mb-2">
                                    <label for="" class="form-label">Description:</label>
                                    <textarea name="description" class="form-control"
                                        rows="3">{{ song.description }}</textarea>
                                </div>
                                <div class="col-12 mb-2">
                                    <label for="" class="form-label">Lyrics:</label>
                                    <textarea name="lyrics" class="form-control mb-3"
                                        rows="3">{{ song.lyrics }}</textarea>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success mt-1 mb-3">submit</button>
                            {% if messages %}
                            <div>
                                {% for msg in messages %}
                                {% if msg.tags == "success" %}
                                <span class="text-success fw-bold">
                                    {{ msg }}
                                </span>
                                {% else %}
                                <span class="text-danger fw-bold">
                                    {{ msg }}
                                </span>
                                {% endif %}
                                {% endfor %}
                            </div>
                            {% endif %}
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
